name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm globally
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: src/frontend

      - name: 🔓 Unlock & Fix Package (The Real Fix)
        run: |
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');
          try {
            const output = execSync('find node_modules -name StorageClient.js').toString().trim();
            if (output) {
              const files = output.split('\n');
              files.forEach(file => {
                if(!file) return;
                // 1. PNPM का ताला तोड़ो (Permissions Unlock)
                fs.chmodSync(file, 0o666);
                
                // 2. गड़बड़ वाले कोड को मिटाओ और सही कोड डालो
                let content = fs.readFileSync(file, 'utf8');
                content = content.replace(/isV3ResponseBody\s*,?/g, '');
                content = 'const isV3ResponseBody = () => false;\n' + content;
                fs.writeFileSync(file, content, 'utf8');
                console.log('Successfully unlocked and patched: ' + file);
              });
            }
          } catch (err) {
            console.error('Patch failed:', err);
            process.exit(1);
          }
          "
        working-directory: src/frontend

      - name: Build Project
        run: pnpm run build
        working-directory: src/frontend

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: gigastars-smileup
          
