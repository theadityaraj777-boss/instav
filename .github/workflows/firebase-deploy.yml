name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm globally
        run: npm install -g pnpm
      - name: Clean and Fresh Install
        run: |
          pnpm env use --global 20
          pnpm install --no-frozen-lockfile
        working-directory: src/frontend
      - name: Force Update All ICP Packages
        run: |
          pnpm add @dfinity/agent @dfinity/candid @dfinity/principal @dfinity/identity @dfinity/auth-client --save-exact
          pnpm add @icp-sdk/core@5.4.0 --save-exact || echo "Bypassing SDK force alert"
        working-directory: src/frontend
      - name: Build Project Safely
        run: pnpm run build || (npm install -g vite && vite build)
        working-directory: src/frontend
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: gigastars-smileup
          
