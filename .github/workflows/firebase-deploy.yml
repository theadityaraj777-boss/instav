name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm globally
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: src/frontend

      - name: 😎 200 IQ Live Package Hotfix
        run: |
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');
          try {
            const output = execSync('find node_modules -name StorageClient.js').toString().trim();
            if (output) {
              const files = output.split('\n');
              files.forEach(file => {
                let content = fs.readFileSync(file, 'utf8');
                content = content.replace(/import\s*{\s*isV3ResponseBody\s*}\s*from\s*['\"]@icp-sdk\/core\/agent['\"];/, 'const isV3ResponseBody = () => false;');
                fs.writeFileSync(file, content, 'utf8');
                console.log('Successfully patched broken library file: ' + file);
              });
            }
          } catch (err) {
            console.log('Patch skipped:', err.message);
          }
          "
        working-directory: src/frontend

      - name: Build Project
        run: pnpm run build
        working-directory: src/frontend

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: gigastars-smileup
          
